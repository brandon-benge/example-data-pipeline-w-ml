apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-bootstrap-script
  namespace: data-platform-process
data:
  bootstrap-flink.sh: |
    #!/bin/sh
    set -eu
    mkdir -p /tmp/flink-conf /tmp/flink-tmp /opt/flink/state/checkpoints /opt/flink/state/savepoints
    cp -R /opt/flink/conf/. /tmp/flink-conf/
    cp /opt/flink/usrlib/repo/config/flink/flink-conf.yaml /tmp/flink-conf/flink-conf.yaml
    export FLINK_CONF_DIR=/tmp/flink-conf
    export JAVA_TOOL_OPTIONS="--add-opens=java.base/java.net=ALL-UNNAMED -Djava.io.tmpdir=/tmp/flink-tmp ${JAVA_TOOL_OPTIONS:-}"
    extra_classpath=""
    for jar in /opt/flink/usrlib/repo/flink/jars/*.jar; do
      if [ -f "$jar" ]; then
        target="/opt/flink/lib/$(basename "$jar")"
        if [ ! -e "$target" ]; then
          ln -sf "$jar" "$target"
        fi
        if [ -n "$extra_classpath" ]; then
          extra_classpath="${extra_classpath}:"
        fi
        extra_classpath="${extra_classpath}${jar}"
      fi
    done
    if [ -n "$extra_classpath" ]; then
      export FLINK_CLASSPATH="${extra_classpath}${FLINK_CLASSPATH:+:${FLINK_CLASSPATH}}"
    fi
    chmod 1777 /tmp /tmp/flink-tmp
    chmod -R 777 /tmp/flink-conf /opt/flink/state
    if ! command -v python3 >/dev/null 2>&1; then
      apt-get update
      apt-get install -y --no-install-recommends python3 python3-pip
      rm -rf /var/lib/apt/lists/*
    fi
    if [ ! -x /usr/bin/python ]; then
      ln -sf /usr/bin/python3 /usr/bin/python
    fi
    exec /bin/sh "$@"
  start-flink.sh: |
    #!/bin/sh
    set -eu

    STALE_MINUTES="${TEMP_DIR_TTL_MINUTES:-20}"

    cleanup_path() {
      path="$1"
      if [ -e "$path" ]; then
        if [ -d "$path" ]; then
          find "$path" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
        else
          rm -f "$path"
        fi
      fi
    }

    cleanup_startup_paths() {
      cleanup_path /tmp/flink-tmp
      cleanup_stale_paths
    }

    cleanup_stale_paths() {
      find /tmp -maxdepth 1 \( \
        -name 'tm_*' -o \
        -name 'flink-dist-cache-*' -o \
        -name 'flink-io-*' -o \
        -name 'flink-netty-shuffle-*' -o \
        -name 'python-dist-*' -o \
        -name 'flink-rpc-akka*.jar' \
      \) -mmin +"$STALE_MINUTES" -exec rm -rf {} +
    }

    cleanup_startup_paths

    mkdir -p /tmp/flink-tmp

    role="${1:-}"

    case "$role" in
      jobmanager)
        exec /opt/flink/bin/jobmanager.sh start-foreground
        ;;
      taskmanager)
        exec /opt/flink/bin/taskmanager.sh start-foreground
        ;;
      *)
        echo "Usage: $0 <jobmanager|taskmanager>" >&2
        exit 1
        ;;
    esac
---
apiVersion: apps/v1
