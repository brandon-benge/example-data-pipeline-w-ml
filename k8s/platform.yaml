apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-bootstrap
  namespace: data-platform-infra
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-bootstrap
        platform.example.io/stack: ingestion
    spec:
      initContainers:
        - name: repo-sync
          image: alpine/git:2.47.2
          env:
            - name: GIT_REPO_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GIT_REPO_URL
            - name: GIT_REPO_REF
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GIT_REPO_REF
          command: ["/bin/sh", "-c", "git clone --depth 1 --branch \"$GIT_REPO_REF\" \"$GIT_REPO_URL\" /workspace"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: repo-source
              mountPath: /workspace
        - name: wait-for-kafka
          image: apache/kafka:4.2.0
          command:
            - /bin/sh
            - -lc
            - |
              attempt=0
              until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka.data-platform-infra:9092 --list >/dev/null 2>&1; do
                attempt=$((attempt + 1))
                if [ "$attempt" -ge 60 ]; then
                  echo "Kafka admin endpoint did not become ready in time." >&2
                  exit 1
                fi
                sleep 2
              done
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      restartPolicy: OnFailure
      containers:
        - name: kafka-bootstrap
          image: apache/kafka:4.2.0
          command: ["/bin/sh", "/bootstrap-tools/bootstrap-topics.sh"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka.data-platform-infra:9092
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: repo-source
              mountPath: /config/kafka
              subPath: config/kafka
            - name: kafka-bootstrap-tools
              mountPath: /bootstrap-tools
      volumes:
        - name: repo-source
          emptyDir: {}
        - name: kafka-bootstrap-tools
          configMap:
            name: kafka-bootstrap-tools
            defaultMode: 0755
---
