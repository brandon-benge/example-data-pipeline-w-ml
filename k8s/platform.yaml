            - name: flink-deps
              mountPath: /opt/flink/usrlib/repo/flink/.deps
            - name: flink-bootstrap-script
              mountPath: /bootstrap
            - name: flink-tmp
              mountPath: /tmp/flink-tmp
      volumes:
        - name: repo-source
