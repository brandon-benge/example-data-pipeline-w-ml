apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: data-platform-infra
type: Opaque
stringData:
  POSTGRES_DB: app_db
  POSTGRES_USER: app_user
  POSTGRES_PASSWORD: change-me
  ICEBERG_CATALOG_URI: jdbc:postgresql://postgres.data-platform-infra:5432/app_db?user=app_user&password=change-me
  MINIO_ROOT_USER: minio
  MINIO_ROOT_PASSWORD: minio123
  AWS_ACCESS_KEY_ID: minio
  AWS_SECRET_ACCESS_KEY: minio123
  TRINO_USER: trino
  SUPERSET_ADMIN_USERNAME: admin
  SUPERSET_ADMIN_FIRSTNAME: Platform
  SUPERSET_ADMIN_LASTNAME: Admin
  SUPERSET_ADMIN_EMAIL: admin@example.com
  SUPERSET_ADMIN_PASSWORD: change-me
