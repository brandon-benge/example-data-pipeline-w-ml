        - name: kafka-connect-sinks
          image: quay.io/debezium/connect:3.3.2.Final
          env:
            - name: BOOTSTRAP_SERVERS
              value: kafka.data-platform-infra:9092
            - name: GROUP_ID
              value: "2"
            - name: CONFIG_STORAGE_TOPIC
              value: debezium_sink_connect_configs
            - name: OFFSET_STORAGE_TOPIC
              value: debezium_sink_connect_offsets
            - name: STATUS_STORAGE_TOPIC
              value: debezium_sink_connect_statuses
            - name: CONFIG_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: OFFSET_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: STATUS_STORAGE_REPLICATION_FACTOR
              value: "1"
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: KAFKA_HEAP_OPTS
              value: -Xms256M -Xmx512M
            - name: REST_HOST_NAME
              value: kafka-connect-sinks
            - name: ADVERTISED_HOST_NAME
              value: kafka-connect-sinks
            - name: CONNECT_PLUGIN_PATH
              value: /kafka/connect
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          ports:
            - containerPort: 8083
          volumeMounts:
            - name: repo-source
              mountPath: /kafka/config/log4j.properties
              subPath: config/debezium/connect-log4j.properties
              readOnly: true
            - name: connect-plugins
              mountPath: /kafka/connect/iceberg
              subPath: iceberg
      volumes:
        - name: repo-source
          emptyDir: {}
        - name: connect-plugins
          persistentVolumeClaim:
            claimName: kafka-connect-plugin-cache
