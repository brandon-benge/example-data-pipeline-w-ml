services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_replication_slots=4
      - -c
      - max_wal_senders=4
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [platform]

  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_HEAP_OPTS: "-Xms512m -Xmx1024m"
    ports:
      - "9092:9092"
      - "19092:19092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    mem_limit: 1536m
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 18
    restart: unless-stopped
    networks: [platform]

  kafka-bootstrap:
    image: apache/kafka:4.2.0
    container_name: kafka-bootstrap
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/config/kafka/bootstrap-topics.sh"]
    volumes:
      - ./config/kafka:/config/kafka:ro
    restart: "no"
    networks: [platform]

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks: [platform]

  schema-registry-bootstrap:
    image: curlimages/curl:8.7.1
    container_name: schema-registry-bootstrap
    depends_on:
      schema-registry:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/config/schema-registry/register-subjects.sh"]
    volumes:
      - ./config/schema-registry:/config/schema-registry:ro
    restart: "no"
    networks: [platform]

  kafka-connect-source:
    build:
      context: .
      dockerfile: config/debezium/Dockerfile
    container_name: kafka-connect-source
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium_source_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_source_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_source_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      REST_HOST_NAME: kafka-connect-source
      ADVERTISED_HOST_NAME: kafka-connect-source
      CONNECT_PLUGIN_PATH: /kafka/connect
      KAFKA_HEAP_OPTS: -Xms512m -Xmx1g
    ports:
      - "8083:8083"
    mem_limit: 5g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks: [platform]

  kafka-connect-sinks:
    build:
      context: .
      dockerfile: config/debezium/Dockerfile
    container_name: kafka-connect-sinks
    depends_on:
      kafka:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 2
      CONFIG_STORAGE_TOPIC: debezium_sink_connect_configs
      OFFSET_STORAGE_TOPIC: debezium_sink_connect_offsets
      STATUS_STORAGE_TOPIC: debezium_sink_connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      REST_HOST_NAME: kafka-connect-sinks
      ADVERTISED_HOST_NAME: kafka-connect-sinks
      CONNECT_PLUGIN_PATH: /kafka/connect
      KAFKA_HEAP_OPTS: -Xms512m -Xmx1g
    ports:
      - "8084:8083"
    mem_limit: 5g
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/connectors >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks: [platform]
    volumes:
      - ./config/debezium/connect-log4j.properties:/kafka/config/log4j.properties:ro

  kafka-connect-source-bootstrap:
    image: curlimages/curl:8.7.1
    container_name: kafka-connect-source-bootstrap
    depends_on:
      kafka-connect-source:
        condition: service_healthy
      kafka-bootstrap:
        condition: service_completed_successfully
    environment:
      CONNECT_BASE_URL: http://kafka-connect-source:8083
      CONNECT_ROLE: source
    entrypoint: ["/bin/sh", "/config/debezium/register-connector.sh"]
    volumes:
      - ./config/debezium:/config/debezium:ro
    restart: "no"
    networks: [platform]

  kafka-connect-sinks-bootstrap:
    image: curlimages/curl:8.7.1
    container_name: kafka-connect-sinks-bootstrap
    depends_on:
      kafka-connect-sinks:
        condition: service_healthy
      kafka-bootstrap:
        condition: service_completed_successfully
      iceberg-cdc-bootstrap:
        condition: service_completed_successfully
    environment:
      CONNECT_BASE_URL: http://kafka-connect-sinks:8083
      CONNECT_ROLE: sinks
    entrypoint: ["/bin/sh", "/config/debezium/register-connector.sh"]
    volumes:
      - ./config/debezium:/config/debezium:ro
    restart: "no"
    networks: [platform]

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks: [platform]

  minio-bootstrap:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    container_name: minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/config/iceberg/bootstrap-warehouse.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./config/iceberg:/config/iceberg:ro
    restart: "no"
    networks: [platform]

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    container_name: iceberg-rest
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      CATALOG_WAREHOUSE: ${ICEBERG_WAREHOUSE}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_URI: ${ICEBERG_CATALOG_URI:-jdbc:postgresql://postgres:5432/${POSTGRES_DB}?user=${POSTGRES_USER}&password=${POSTGRES_PASSWORD}}
    ports:
      - "8181:8181"
    networks: [platform]

  iceberg-cdc-bootstrap:
    image: trinodb/trino:448
    container_name: iceberg-cdc-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
      iceberg-rest:
        condition: service_started
      trino:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/config/iceberg/bootstrap-cdc-rest-catalog.sh"]
    volumes:
      - ./config/iceberg:/config/iceberg:ro
    restart: "no"
    networks: [platform]

  flink-jobmanager:
    build:
      context: .
      dockerfile: config/flink/Dockerfile
    container_name: flink-jobmanager
    depends_on:
      flink-jars-bootstrap:
        condition: service_completed_successfully
      kafka-bootstrap:
        condition: service_completed_successfully
      schema-registry-bootstrap:
        condition: service_completed_successfully
      iceberg-rest:
        condition: service_started
      redis:
        condition: service_started
    entrypoint: ["/bin/sh", "/opt/flink/bootstrap/start-flink.sh"]
    command: ["jobmanager"]
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      FLINK_JOB_POLL_SECONDS: "15"
      TEMP_DIR_TTL_MINUTES: "20"
      PYTHONPATH: /opt/flink/usrlib/repo/flink:/opt/flink/opt/python/pyflink_pkg:/opt/flink/opt/python/py4j-0.10.9.7-src.zip:/opt/flink/usrlib/repo:/opt/flink/usrlib/repo/flink/.deps
      FLINK_PIPELINE_JARS: file:///opt/flink/opt/flink-python-1.20.3.jar;file:///opt/flink/usrlib/repo/flink/jars/iceberg-flink-runtime-1.20-1.10.1.jar;file:///opt/flink/usrlib/repo/flink/jars/flink-sql-connector-kafka-3.3.0-1.20.jar;file:///opt/flink/usrlib/repo/flink/jars/hadoop-client-api-3.4.1.jar;file:///opt/flink/usrlib/repo/flink/jars/hadoop-client-runtime-3.4.1.jar;file:///opt/flink/usrlib/repo/flink/jars/iceberg-aws-bundle-1.10.1.jar
    ports:
      - "8082:8081"
    mem_limit: 4g
    restart: unless-stopped
    volumes:
      - ./config/flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./config/flink/submit-jobs.sh:/opt/flink/bootstrap/submit-jobs.sh:ro
      - ./config/flink/start-flink.sh:/opt/flink/bootstrap/start-flink.sh:ro
      - ./state/flink:/opt/flink/state
      - ./flink:/opt/flink/usrlib/repo/flink:rw
      - ./config/features:/opt/flink/usrlib/repo/config/features:ro
      - ./generator/schemas:/opt/flink/usrlib/repo/generator/schemas:ro
    networks: [platform]

  flink-taskmanager:
    build:
      context: .
      dockerfile: config/flink/Dockerfile
    container_name: flink-taskmanager
    depends_on:
      flink-jars-bootstrap:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_started
    entrypoint: ["/bin/sh", "/opt/flink/bootstrap/start-flink.sh"]
    command: ["taskmanager"]
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      FLINK_JOB_POLL_SECONDS: "15"
      TEMP_DIR_TTL_MINUTES: "20"
      PYTHONPATH: /opt/flink/usrlib/repo/flink:/opt/flink/opt/python/pyflink_pkg:/opt/flink/opt/python/py4j-0.10.9.7-src.zip:/opt/flink/usrlib/repo:/opt/flink/usrlib/repo/flink/.deps
      FLINK_PIPELINE_JARS: file:///opt/flink/opt/flink-python-1.20.3.jar;file:///opt/flink/usrlib/repo/flink/jars/iceberg-flink-runtime-1.20-1.10.1.jar;file:///opt/flink/usrlib/repo/flink/jars/flink-sql-connector-kafka-3.3.0-1.20.jar;file:///opt/flink/usrlib/repo/flink/jars/hadoop-client-api-3.4.1.jar;file:///opt/flink/usrlib/repo/flink/jars/hadoop-client-runtime-3.4.1.jar;file:///opt/flink/usrlib/repo/flink/jars/iceberg-aws-bundle-1.10.1.jar
    mem_limit: 9g
    restart: unless-stopped
    volumes:
      - ./config/flink/flink-conf.yaml:/opt/flink/conf/flink-conf.yaml:ro
      - ./config/flink/start-flink.sh:/opt/flink/bootstrap/start-flink.sh:ro
      - ./state/flink:/opt/flink/state
      - ./flink:/opt/flink/usrlib/repo/flink:rw
      - ./config/features:/opt/flink/usrlib/repo/config/features:ro
      - ./generator/schemas:/opt/flink/usrlib/repo/generator/schemas:ro
    networks: [platform]

  flink-python-bootstrap:
    build:
      context: .
      dockerfile: config/flink/Dockerfile
    container_name: flink-python-bootstrap
    entrypoint:
      - /bin/sh
      - -c
      - |
        python3 -m pip install --no-cache-dir --target /opt/flink/usrlib/repo/flink/.deps -r /opt/flink/usrlib/repo/flink/requirements.txt
    volumes:
      - ./flink:/opt/flink/usrlib/repo/flink:rw
    restart: "no"
    networks: [platform]

  flink-jars-bootstrap:
    image: curlimages/curl:8.7.1
    container_name: flink-jars-bootstrap
    entrypoint: ["/bin/sh", "/opt/flink/bootstrap/download-jars.sh"]
    volumes:
      - ./flink:/opt/flink/usrlib/repo/flink:rw
      - ./config/flink/download-jars.sh:/opt/flink/bootstrap/download-jars.sh:ro
    restart: "no"
    networks: [platform]

  flink-bootstrap-bronze-events:
    build:
      context: .
      dockerfile: config/flink/Dockerfile
    container_name: flink-bootstrap-bronze-events
    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      flink-jars-bootstrap:
        condition: service_completed_successfully
      flink-python-bootstrap:
        condition: service_completed_successfully
      kafka-bootstrap:
        condition: service_completed_successfully
      schema-registry-bootstrap:
        condition: service_completed_successfully
      kafka-connect-sinks-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_started
    entrypoint: ["/bin/sh", "/opt/flink/bootstrap/submit-jobs.sh", "bronze-events-to-iceberg", "flink.jobs.bronze_events_to_iceberg"]
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      PYTHONPATH: /opt/flink/usrlib/repo/flink:/opt/flink/opt/python/pyflink_pkg:/opt/flink/opt/python/py4j-0.10.9.7-src.zip:/opt/flink/usrlib/repo:/opt/flink/usrlib/repo/flink/.deps
      FLINK_PIPELINE_JARS: file:///opt/flink/opt/flink-python-1.20.3.jar;file:///opt/flink/usrlib/repo/flink/jars/iceberg-flink-runtime-1.20-1.10.1.jar;file:///opt/flink/usrlib/repo/flink/jars/flink-sql-connector-kafka-3.3.0-1.20.jar;file:///opt/flink/usrlib/repo/flink/jars/hadoop-client-api-3.4.1.jar;file:///opt/flink/usrlib/repo/flink/jars/hadoop-client-runtime-3.4.1.jar;file:///opt/flink/usrlib/repo/flink/jars/iceberg-aws-bundle-1.10.1.jar
    volumes:
      - ./config/flink/submit-jobs.sh:/opt/flink/bootstrap/submit-jobs.sh:ro
      - ./flink:/opt/flink/usrlib/repo/flink:rw
      - ./config/features:/opt/flink/usrlib/repo/config/features:ro
      - ./generator/schemas:/opt/flink/usrlib/repo/generator/schemas:ro
    restart: unless-stopped
    networks: [platform]

  flink-bootstrap-online-features:
    build:
      context: .
      dockerfile: config/flink/Dockerfile
    container_name: flink-bootstrap-online-features
    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      flink-jars-bootstrap:
        condition: service_completed_successfully
      flink-python-bootstrap:
        condition: service_completed_successfully
      kafka-bootstrap:
        condition: service_completed_successfully
      schema-registry-bootstrap:
        condition: service_completed_successfully
      kafka-connect-sinks-bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_started
    entrypoint: ["/bin/sh", "/opt/flink/bootstrap/submit-jobs.sh", "online-features-to-redis", "flink.jobs.online_features_to_redis"]
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      PYTHONPATH: /opt/flink/usrlib/repo/flink:/opt/flink/opt/python/pyflink_pkg:/opt/flink/opt/python/py4j-0.10.9.7-src.zip:/opt/flink/usrlib/repo:/opt/flink/usrlib/repo/flink/.deps
      FLINK_PIPELINE_JARS: file:///opt/flink/opt/flink-python-1.20.3.jar;file:///opt/flink/usrlib/repo/flink/jars/iceberg-flink-runtime-1.20-1.10.1.jar;file:///opt/flink/usrlib/repo/flink/jars/flink-sql-connector-kafka-3.3.0-1.20.jar;file:///opt/flink/usrlib/repo/flink/jars/hadoop-client-api-3.4.1.jar;file:///opt/flink/usrlib/repo/flink/jars/hadoop-client-runtime-3.4.1.jar;file:///opt/flink/usrlib/repo/flink/jars/iceberg-aws-bundle-1.10.1.jar
    volumes:
      - ./config/flink/submit-jobs.sh:/opt/flink/bootstrap/submit-jobs.sh:ro
      - ./flink:/opt/flink/usrlib/repo/flink:rw
      - ./config/features:/opt/flink/usrlib/repo/config/features:ro
      - ./generator/schemas:/opt/flink/usrlib/repo/generator/schemas:ro
    restart: unless-stopped
    networks: [platform]

  spark:
    image: spark:4.0.1-python3
    container_name: spark
    depends_on:
      spark-jars-bootstrap:
        condition: service_completed_successfully
      iceberg-rest:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-east-1
      PYTHONPATH: /app
    command: ["/bin/sh", "-c", "sleep infinity"]
    volumes:
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark:/app/spark:rw
      - ./config/spark/run-jobs.sh:/app/bootstrap/run-jobs.sh:ro
      - ./config/features:/app/config/features:ro
      - ./config/governance:/app/config/governance:ro
      - ./metadata:/app/metadata:rw
      - ./ml:/app/ml:rw
    restart: unless-stopped
    networks: [platform]

  spark-jars-bootstrap:
    image: curlimages/curl:8.7.1
    container_name: spark-jars-bootstrap
    entrypoint: ["/bin/sh", "/app/bootstrap/download-jars.sh"]
    volumes:
      - ./spark:/app/spark:rw
      - ./config/spark/download-jars.sh:/app/bootstrap/download-jars.sh:ro
    restart: "no"
    networks: [platform]

  spark-bootstrap:
    image: spark:4.0.1-python3
    container_name: spark-bootstrap
    depends_on:
      spark-jars-bootstrap:
        condition: service_completed_successfully
      spark:
        condition: service_started
      iceberg-rest:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-east-1
      PYTHONPATH: /app
      SPARK_BATCH_INTERVAL_SECONDS: ${SPARK_BATCH_INTERVAL_SECONDS:-60}
      TEMP_DIR_TTL_MINUTES: "20"
    entrypoint: ["/bin/sh", "/app/bootstrap/start-scheduler.sh"]
    ports:
      - "4040:4040"
    restart: unless-stopped
    volumes:
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./config/spark/run-jobs.sh:/app/bootstrap/run-jobs.sh:ro
      - ./config/spark/start-scheduler.sh:/app/bootstrap/start-scheduler.sh:ro
      - ./spark:/app/spark:rw
      - ./config/features:/app/config/features:ro
      - ./config/governance:/app/config/governance:ro
      - ./metadata:/app/metadata:rw
      - ./ml:/app/ml:rw
    networks: [platform]

  redis:
    image: redis:7.2
    container_name: redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [platform]

  ml-training:
    build:
      context: .
      dockerfile: config/ml-training/Dockerfile
    container_name: ml-training
    depends_on:
      minio:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
      trino:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_USER: ${TRINO_USER}
      TRINO_CATALOG: iceberg
      TRINO_SCHEMA: silver
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MODEL_ARTIFACT_S3_ENDPOINT: http://minio:9000
      MODEL_ARTIFACT_BUCKET: ml-artifacts
      MODEL_ARTIFACT_REGION: us-east-1
    restart: "no"
    networks: [platform]

  ml-inference:
    build:
      context: .
      dockerfile: config/inference/Dockerfile
    container_name: ml-inference
    depends_on:
      ml-training:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
      trino:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_USER: ${TRINO_USER}
      TRINO_CATALOG: iceberg
      TRINO_SCHEMA: silver
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MODEL_ARTIFACT_S3_ENDPOINT: http://minio:9000
      MODEL_ARTIFACT_BUCKET: ml-artifacts
      MODEL_ARTIFACT_REGION: us-east-1
    ports:
      - "8010:8010"
    volumes:
      - ./ml:/app/ml:ro
      - ./config/features:/app/config/features:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks: [platform]

  trino:
    image: trinodb/trino:448
    container_name: trino
    restart: unless-stopped
    depends_on:
      iceberg-rest:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./config/trino/config.properties:/etc/trino/config.properties:ro
      - ./config/trino/jvm.config:/etc/trino/jvm.config:ro
      - ./config/trino/catalog/iceberg.properties:/etc/trino/catalog/iceberg.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks: [platform]

  dbt:
    image: spark:4.0.1-python3
    container_name: dbt
    user: root
    mem_limit: 4g
    depends_on:
      spark:
        condition: service_started
      spark-jars-bootstrap:
        condition: service_completed_successfully
      iceberg-rest:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_REGION: us-east-1
      AWS_SECRET_ACCESS_KEY: minio123
      DBT_PROFILES_DIR: /tmp/dbt-profiles
      HOME: /tmp/dbt-home
      PATH: /tmp/dbt-home/.local/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    command:
      - /bin/sh
      - -c
      - |
        /bin/sh /app/bootstrap/bootstrap.sh
        sleep infinity
    volumes:
      - ./dbt:/usr/app:rw
      - ./metadata:/app/metadata:rw
      - ./config/dbt/profiles.yml:/tmp/dbt-profiles/profiles.yml:ro
      - ./config/dbt:/app/bootstrap:ro
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark:/app/spark:rw
    working_dir: /usr/app
    networks: [platform]

  dbt-scheduler:
    image: spark:4.0.1-python3
    container_name: dbt-scheduler
    user: root
    mem_limit: 4g
    restart: unless-stopped
    depends_on:
      dbt:
        condition: service_started
      spark:
        condition: service_started
      spark-jars-bootstrap:
        condition: service_completed_successfully
      iceberg-rest:
        condition: service_started
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: minio
      AWS_REGION: us-east-1
      AWS_SECRET_ACCESS_KEY: minio123
      DBT_BUILD_CHUNK_SLEEP_SECONDS: "0.1"
      DBT_BUILD_INTERVAL_SECONDS: "120"
      DBT_PROFILES_DIR: /tmp/dbt-profiles
      HOME: /tmp/dbt-home
      PATH: /tmp/dbt-home/.local/bin:/opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    command: ["/bin/sh", "-c", "/bin/sh /app/bootstrap/run-scheduler.sh"]
    volumes:
      - ./dbt:/usr/app:rw
      - ./metadata:/app/metadata:rw
      - ./config/dbt:/app/bootstrap:ro
      - ./config/dbt/profiles.yml:/tmp/dbt-profiles/profiles.yml:ro
      - ./config/spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark:/app/spark:rw
    working_dir: /usr/app
    networks: [platform]

  superset:
    image: apache/superset:3.1.1
    container_name: superset
    depends_on:
      trino:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: local-demo-secret-key
      PYTHONPATH: /app/pythonpath
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
    command: ["/bin/sh", "-c", "/bin/sh /app/bootstrap/bootstrap_python.sh && gunicorn --bind 0.0.0.0:8088 'superset.app:create_app()'"]
    ports:
      - "8088:8088"
    volumes:
      - superset-home:/app/superset_home
      - ./config/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./config/superset/bootstrap:/app/bootstrap:ro
      - ./bi:/app/bi:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 24
    networks: [platform]

  superset-bootstrap:
    image: apache/superset:3.1.1
    container_name: superset-bootstrap
    depends_on:
      superset:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: local-demo-secret-key
      PYTHONPATH: /app/pythonpath
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
    entrypoint: ["/bin/sh", "/app/bootstrap/init_superset.sh"]
    volumes:
      - superset-home:/app/superset_home
      - ./config/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./config/superset/bootstrap:/app/bootstrap:ro
      - ./bi:/app/bi:ro
    restart: "no"
    networks: [platform]

  metadata:
    image: python:3.11-slim
    container_name: metadata
    command: ["python", "-m", "http.server", "9002", "--directory", "/srv/metadata"]
    ports:
      - "9002:9002"
    volumes:
      - ./metadata:/srv/metadata:ro
      - ./config/governance:/srv/governance:ro
      - ./config/features:/srv/features:ro
    networks: [platform]

  generator:
    image: python:3.11-slim
    container_name: generator
    profiles: ["manual"]
    working_dir: /app
    command: ["python", "generator/app.py", "--help"]
    volumes:
      - ./:/app:rw
    networks: [platform]

networks:
  platform:
    name: platform

volumes:
  postgres-data:
  kafka-data:
  minio-data:
  redis-data:
  superset-home:
