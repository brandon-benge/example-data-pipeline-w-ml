apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: data-platform-infra
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        platform.example.io/stack: ingestion
    spec:
      initContainers:
        - name: repo-sync
          image: alpine/git:2.47.2
          env:
            - name: GIT_REPO_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GIT_REPO_URL
            - name: GIT_REPO_REF
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GIT_REPO_REF
          command:
            - /bin/sh
            - -c
            - git clone --depth 1 --branch "$GIT_REPO_REF" "$GIT_REPO_URL" /workspace
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: repo-source
              mountPath: /workspace
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: Always
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          args: ["-c", "wal_level=logical", "-c", "max_replication_slots=4", "-c", "max_wal_senders=4"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "app_user", "-d", "app_db"]
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: postgres-persistent
              mountPath: /var/lib/postgresql/data
            - name: repo-source
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: config/postgres/init.sql
              readOnly: true
      volumes:
        - name: postgres-persistent
          persistentVolumeClaim:
            claimName: postgres-data
        - name: repo-source
          emptyDir: {}
