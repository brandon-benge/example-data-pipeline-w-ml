                  name: platform-config
                  key: KAFKA_CLUSTER_ID
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@kafka-0.kafka-headless.data-platform-infra.svc.cluster.local:9093
            - name: KAFKA_LISTENERS
              value: INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: INTERNAL://kafka.data-platform-infra:9092,EXTERNAL://localhost:19092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: INTERNAL
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
            - name: KAFKA_NUM_PARTITIONS
              value: "1"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_HEAP_OPTS
              value: -Xms512m -Xmx512m
          ports:
            - containerPort: 9092
            - containerPort: 19092
            - containerPort: 9093
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 1536Mi
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
          volumeMounts:
            - name: kafka-persistent
              mountPath: /var/lib/kafka
      volumes:
        - name: kafka-persistent
          persistentVolumeClaim:
            claimName: kafka-data
