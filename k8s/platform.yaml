            - name: FLINK_PIPELINE_JARS
              value: file:///opt/flink/opt/flink-python-1.20.3.jar;file:///opt/flink/usrlib/repo/flink/jars/iceberg-flink-runtime-1.20-1.10.1.jar;file:///opt/flink/usrlib/repo/flink/jars/flink-sql-connector-kafka-3.3.0-1.20.jar;file:///opt/flink/usrlib/repo/flink/jars/hadoop-client-api-3.4.1.jar;file:///opt/flink/usrlib/repo/flink/jars/hadoop-client-runtime-3.4.1.jar;file:///opt/flink/usrlib/repo/flink/jars/iceberg-aws-bundle-1.10.1.jar
