  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-connect-sinks
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-connect-sinks
        platform.example.io/stack: stream-processing
    spec:
      enableServiceLinks: false
      initContainers:
        - name: repo-sync
          image: alpine/git:2.47.2
          env:
            - name: GIT_REPO_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GIT_REPO_URL
            - name: GIT_REPO_REF
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: GIT_REPO_REF
          command: ["/bin/sh", "-c", "git clone --depth 1 --branch \"$GIT_REPO_REF\" \"$GIT_REPO_URL\" /workspace"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: repo-source
              mountPath: /workspace
        - name: verify-iceberg-plugin-cache
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              if find /plugin/iceberg -maxdepth 1 -name '*.jar' | grep -q .; then
                echo "Iceberg Kafka Connect plugin cache present"
                exit 0
              fi
              echo "Iceberg Kafka Connect plugin cache is empty at /plugin/iceberg" >&2
              echo "Populate pvc/kafka-connect-plugin-cache before starting kafka-connect-sinks." >&2
              exit 1
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: connect-plugins
              mountPath: /plugin
